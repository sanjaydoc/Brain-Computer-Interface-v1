name: CI

on:
  push:
    branches: [main]
    paths: ["backend/**", "pyproject.toml", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["backend/**", "pyproject.toml"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv venv --python 3.11
      - name: Install
        run: uv pip install -e ".[dev]"
      - name: Run tests
        run: uv run pytest -q
